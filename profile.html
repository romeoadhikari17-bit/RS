<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialSpark — Profile</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    (function(){var t=localStorage.getItem('ss_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <i class="fa-solid fa-bolt"></i> SocialSpark
    </a>
    <div class="nav-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search users…" autocomplete="off" />
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
    <div class="nav-actions">
      <a href="index.html" class="nav-icon" title="Home">
        <i class="fa-solid fa-house"></i>
      </a>
      <a href="explore.html" class="nav-icon" title="Explore">
        <i class="fa-solid fa-compass"></i>
      </a>
      <a href="#" class="nav-icon" title="Notifications" id="notifBtn">
        <i class="fa-solid fa-bell"></i>
        <span class="badge" id="notifBadge" style="display:none"></span>
      </a>
      <a href="#" class="nav-icon" title="Toggle theme" id="themeToggle">
        <i class="fa-solid fa-moon"></i>
      </a>
      <div class="nav-avatar-wrap" id="navAvatarWrap">
        <img src="" alt="avatar" class="nav-avatar" id="navAvatar" />
        <div class="nav-dropdown">
          <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
          <a href="#" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- NOTIFICATIONS PANEL -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <span>Notifications</span>
      <button id="clearNotifs">Clear all</button>
    </div>
    <ul id="notifList"></ul>
    <p class="notif-empty" id="notifEmpty">No notifications yet.</p>
  </div>
  <div class="overlay" id="notifOverlay"></div>

  <!-- PROFILE HEADER -->
  <div class="profile-header-wrap">
    <div class="profile-cover" id="profileCover">
      <div class="profile-cover-overlay"></div>
    </div>
    <div class="profile-info-row">
      <div class="profile-avatar-wrap">
        <img src="" alt="avatar" class="profile-big-avatar" id="profileAvatar" />
      </div>
      <div class="profile-meta">
        <h1 id="profileDisplayName"></h1>
        <p class="profile-handle" id="profileHandleText"></p>
        <p class="profile-bio" id="profileBio"></p>
        <div class="profile-stats">
          <div class="stat"><span id="statPosts">0</span><small>Posts</small></div>
          <div class="stat clickable" id="statFollowersWrap"><span id="statFollowers">0</span><small>Followers</small></div>
          <div class="stat clickable" id="statFollowingWrap"><span id="statFollowing">0</span><small>Following</small></div>
        </div>
      </div>
      <div class="profile-actions" id="profileActions">
        <!-- Edit profile (own) or Follow/Unfollow (other) rendered by JS -->
      </div>
    </div>
  </div>

  <!-- FOLLOWERS / FOLLOWING MODALS -->
  <div class="modal-backdrop" id="followModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="followModalTitle">Followers</h3>
        <button class="modal-close" id="closeFollowModal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <ul class="follow-list" id="followModalList"></ul>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal-backdrop" id="editModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="modal-close" id="closeEditModal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="editProfileForm" novalidate>
        <div class="form-group">
          <label for="editDisplayName">Display Name</label>
          <input type="text" id="editDisplayName" required />
        </div>
        <div class="form-group">
          <label for="editBio">Bio</label>
          <textarea id="editBio" maxlength="150" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="editAvatarUrl">Avatar URL</label>
          <input type="text" id="editAvatarUrl" placeholder="https://…" />
        </div>
        <div class="form-group">
          <label for="editCoverUrl">Cover Image URL</label>
          <input type="text" id="editCoverUrl" placeholder="https://…" />
        </div>
        <p class="form-error" id="editError"></p>
        <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
      </form>
    </div>
  </div>

  <!-- PROFILE CONTENT -->
  <main class="profile-content">
    <div class="profile-tabs">
      <button class="profile-tab active" data-tab="posts">Posts</button>
      <button class="profile-tab" data-tab="liked">Liked</button>
    </div>
    <div id="profileFeed"></div>
    <p class="feed-empty" id="profileFeedEmpty" style="display:none">Nothing here yet.</p>
  </main>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
